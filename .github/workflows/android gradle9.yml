name: android-apk-gradle9
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/android.yml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter version
        run: flutter --version
      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app
      - name: Override Gradle wrapper for CI
        run: sed -i 's|distributionUrl=.*|distributionUrl=https://services.gradle.org/distributions/gradle-9.5.1-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
        working-directory: flutter_app
      - name: Build release APK
        run: flutter build apk --release --split-per-abi
        working-directory: flutter_app
      - name: Upload APK artifact (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          name: app-arm64-v8a-release
          path: flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - name: Upload APK artifact (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          name: app-armeabi-v7a-release
          path: flutter_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - name: Upload APK artifact (x86_64)
        uses: actions/upload-artifact@v7
        with:
          name: app-x86_64-release
          path: flutter_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
      - name: Upload APK output-metadata
        uses: actions/upload-artifact@v7
        with:
          name: metadata
          path: flutter_app/build/app/outputs/flutter-apk/output-metadata.json
