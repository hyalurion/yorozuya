<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#667eea"/>

  <!-- Tool box body -->
  <rect x="128" y="192" width="256" height="160" rx="16" fill="#ffffff"/>

  <!-- Box lid -->
  <rect x="112" y="160" width="288" height="48" rx="12" fill="#e8ecf4"/>

  <!-- Handle -->
  <rect x="216" y="144" width="80" height="24" rx="8" fill="#ffffff"/>
  <rect x="232" y="128" width="48" height="32" rx="6" fill="#667eea"/>

  <!-- Keyhole -->
  <circle cx="256" cy="272" r="20" fill="#667eea"/>
  <rect x="248" y="280" width="16" height="40" rx="4" fill="#667eea"/>

  <!-- Tool hints (wrench and screwdriver) -->
  <g transform="translate(160, 300)">
    <!-- Wrench -->
    <path d="M8 0 L20 0 L20 8 L12 16 L4 8 Z" fill="#764ba2"/>
    <rect x="8" y="12" width="8" height="40" rx="2" fill="#764ba2"/>
  </g>

  <g transform="translate(320, 300)">
    <!-- Screwdriver -->
    <rect x="8" y="0" width="12" height="24" rx="3" fill="#764ba2"/>
    <rect x="6" y="20" width="16" height="36" rx="2" fill="#764ba2"/>
  </g>
</svg>
